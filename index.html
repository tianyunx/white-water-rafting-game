<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>激流勇进 · White Water Rafting</title>
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hidden">
  <div class="hud-item">
    <span class="label" data-t="hull">Hull</span>
    <div id="hpbar"><div id="hpfill"></div></div>
  </div>
  <div class="hud-item"><span class="label" data-t="dist">Distance</span><span id="dist" class="value">0 m</span></div>
  <div class="hud-item"><span class="label" data-t="speed">Speed</span><span id="speed" class="value">0.0 m/s</span></div>
  <span id="mute" title="Mute (M)">🔊</span>
</div>

<div id="controls" class="hidden">
  <div class="ctl-group ctl-left">
    <div class="ctl" id="btn-lf">⬆</div>
    <div class="ctl" id="btn-lb">⬇</div>
    <span class="ctl-label" data-t="leftOars">Left</span>
  </div>
  <div class="ctl-group ctl-right">
    <div class="ctl" id="btn-rf">⬆</div>
    <div class="ctl" id="btn-rb">⬇</div>
    <span class="ctl-label" data-t="rightOars">Right</span>
  </div>
</div>

<div id="menu" class="overlay">
  <div id="langBtn">中文</div>
  <h1 data-t="title">White Water Rafting</h1>
  <p class="sub" data-t="sub">激流勇进</p>
  <div class="instructions" id="instructions"></div>
  <p class="prompt" data-t="startPrompt">Press Space or tap anywhere to start</p>
</div>

<div id="over" class="overlay hidden">
  <h1 data-t="overTitle">The raft fell apart!</h1>
  <p class="big"><span data-t="overDist">You rafted</span> <span id="finalDist">0</span> m</p>
  <p class="record"><span data-t="best">Best record</span> <span id="bestDist">0</span> m</p>
  <p class="prompt" data-t="retryPrompt">Press Space or tap to retry</p>
</div>

<!-- ?v= 版本号与 HTML 一起提交更新，保证浏览器不会拿旧缓存的 JS 配新 HTML -->
<script src="js/sound.js?v=2"></script>
<script src="js/river.js?v=2"></script>
<script src="js/boat.js?v=2"></script>
<script src="js/render.js?v=2"></script>
<script src="js/main.js?v=2"></script>
</body>
</html>
